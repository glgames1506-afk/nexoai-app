<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nexo AI | Portal do Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; background: #020617; }
    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .cta-glow {
      background: linear-gradient(135deg, #22d3ee, #a855f7);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
      transition: all 0.3s;
    }
    .cta-glow:hover {
      box-shadow: 0 0 40px rgba(34, 211, 238, 0.4);
      transform: translateY(-1px);
    }
    .input-field {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.2s;
    }
    .input-field:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      outline: none;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: -1; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">

  <!-- Background Orbs -->
  <div class="orb w-[500px] h-[500px] bg-cyan-500/10 -top-40 -left-40"></div>
  <div class="orb w-[500px] h-[500px] bg-violet-500/10 -bottom-40 -right-40"></div>

  <div class="w-full max-w-md fade-in">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html">
        <img src="logo.png" alt="Nexo AI" class="h-12 mx-auto mb-4" onerror="this.src='assets/images/logo-nexo.png'">
      </a>
      <h1 class="text-2xl font-black text-white tracking-tight">Portal do Cliente</h1>
      <p class="text-slate-400 text-sm mt-2">Acesse seu painel de inteligência</p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-3xl p-8 shadow-2xl relative">
      <div id="auth-form">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">E-mail</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
              <input type="email" id="email" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-sm" placeholder="seu@email.com" required>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Senha</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
              <input type="password" id="password" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-sm" placeholder="••••••••" required>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" class="w-4 h-4 rounded border-white/10 bg-slate-900 text-cyan-500 focus:ring-cyan-500/20 focus:ring-offset-0">
              <span class="text-xs text-slate-500 group-hover:text-slate-300 transition-colors">Lembrar acesso</span>
            </label>
            <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 font-semibold">Esqueceu a senha?</a>
          </div>

          <button id="btn-login" class="cta-glow w-full py-4 rounded-2xl text-white font-black text-sm flex items-center justify-center gap-2 mt-4">
            <i data-lucide="log-in" class="w-4 h-4"></i>
            ENTRAR NO DASHBOARD
          </button>
        </div>

        <!-- Social Login Separator -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
          <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-900 px-3 text-slate-500">Ou continue com</span></div>
        </div>

        <button id="btn-google" class="w-full py-3.5 rounded-xl border border-white/10 text-white text-sm font-semibold hover:bg-white/5 transition-all flex items-center justify-center gap-3">
          <svg viewBox="0 0 24 24" class="w-5 h-5"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z" fill="currentColor"/></svg>
          Google
        </button>

        <p class="text-center text-xs text-slate-500 mt-8">
          Não tem uma licença? <a href="index.html#licenca" class="text-white font-bold hover:text-cyan-400">Adquira agora →</a>
        </p>
      </div>

      <!-- Feedback Area -->
      <div id="feedback" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <!-- Security Info -->
    <div class="flex items-center justify-center gap-4 mt-8">
      <div class="flex items-center gap-1.5 opacity-40">
        <i data-lucide="shield-check" class="w-4 h-4 text-cyan-400"></i>
        <span class="text-[10px] text-white font-bold uppercase tracking-widest">SSL Secure</span>
      </div>
      <div class="w-px h-3 bg-white/10"></div>
      <div class="flex items-center gap-1.5 opacity-40">
        <i data-lucide="lock" class="w-4 h-4 text-violet-400"></i>
        <span class="text-[10px] text-white font-bold uppercase tracking-widest">Supabase Protected</span>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
